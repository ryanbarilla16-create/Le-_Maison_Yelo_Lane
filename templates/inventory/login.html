<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Portal — Le Maison</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1B5E20;
            --primary-light: #388E3C;
            --primary-dark: #0A3D0A;
            --accent: #A5D6A7;
            --bg: #EDF5EE;
            --glass: rgba(255,255,255,0.55);
            --glass-border: rgba(255,255,255,0.8);
            --text: #1B3A1F;
            --muted: #6D9B72;
            --danger: #c62828;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Outfit',sans-serif; min-height:100vh; background:var(--bg); display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
        .bg-canvas { position:fixed; inset:0; z-index:0; background: radial-gradient(ellipse 70% 60% at 10% 20%, rgba(56,142,60,0.12) 0%, transparent 60%), radial-gradient(ellipse 60% 70% at 90% 85%, rgba(27,94,32,0.09) 0%, transparent 55%), linear-gradient(150deg, #EDF5EE 0%, #DFF0E0 50%, #CDEACF 100%); }
        .blob { position:absolute; border-radius:50%; filter:blur(65px); animation:drift 10s ease-in-out infinite alternate; }
        .blob-1 { width:460px; height:460px; background:rgba(56,142,60,0.11); top:-120px; left:-80px; animation-duration:11s; }
        .blob-2 { width:360px; height:360px; background:rgba(27,94,32,0.08); bottom:-80px; right:-60px; animation-direction:alternate-reverse; }
        .blob-3 { width:250px; height:250px; background:rgba(165,214,167,0.16); top:45%; left:45%; animation-duration:13s; }
        @keyframes drift { from { transform:translate(0,0) scale(1); } to { transform:translate(25px,18px) scale(1.07); } }
        .card { position:relative; z-index:1; background:var(--glass); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); border:1px solid var(--glass-border); border-radius:28px; padding:48px 44px; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(27,94,32,0.10), 0 1px 0 rgba(255,255,255,0.9) inset; animation:slideUp 0.6s cubic-bezier(.22,1,.36,1) forwards; }
        @keyframes slideUp { from{opacity:0;transform:translateY(40px) scale(0.97);} to{opacity:1;transform:translateY(0) scale(1);} }
        .deco { position:absolute; top:-1px; right:30px; width:60px; height:4px; background:linear-gradient(90deg, var(--primary), var(--accent)); border-radius:0 0 4px 4px; }
        .portal-badge { display:inline-flex; align-items:center; gap:8px; background:rgba(27,94,32,0.08); border:1px solid rgba(27,94,32,0.15); border-radius:50px; padding:6px 16px; font-size:0.72rem; font-weight:600; color:var(--primary); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:22px; }
        .brand { font-family:'Playfair Display',serif; font-size:1.7rem; color:var(--text); margin-bottom:6px; }
        .subtitle { color:var(--muted); font-size:0.87rem; margin-bottom:36px; }
        .alert-error { background:rgba(198,40,40,0.08); border:1px solid rgba(198,40,40,0.2); border-radius:12px; padding:12px 16px; color:var(--danger); font-size:0.84rem; margin-bottom:20px; display:flex; align-items:center; gap:10px; }
        .field-group { margin-bottom:18px; }
        .field-label { display:block; font-size:0.78rem; font-weight:600; color:var(--muted); letter-spacing:0.8px; text-transform:uppercase; margin-bottom:8px; }
        .field-wrap { position:relative; }
        .field-icon { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:0.85rem; pointer-events:none; }
        input[type="email"], input[type="password"] { width:100%; padding:14px 16px 14px 42px; border:1.5px solid rgba(27,94,32,0.15); border-radius:14px; background:rgba(255,255,255,0.6); font-family:'Outfit',sans-serif; font-size:0.95rem; color:var(--text); outline:none; transition:all 0.3s; }
        input:focus { background:rgba(255,255,255,0.9); border-color:var(--primary-light); box-shadow:0 0 0 4px rgba(56,142,60,0.08); }
        input::placeholder { color:#A5C8A8; }
        .toggle-pw { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--muted); font-size:0.85rem; transition:color 0.2s; }
        .toggle-pw:hover { color:var(--primary); }
        .btn-login { width:100%; padding:15px; background:linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-light) 100%); color:#fff; border:none; border-radius:14px; font-family:'Outfit',sans-serif; font-size:0.95rem; font-weight:600; cursor:pointer; transition:all 0.3s; box-shadow:0 6px 20px rgba(27,94,32,0.28); margin-top:8px; letter-spacing:0.4px; display:flex; align-items:center; justify-content:center; gap:10px; }
        .btn-login:hover { transform:translateY(-2px); box-shadow:0 12px 30px rgba(27,94,32,0.35); }
        .footer-note { text-align:center; margin-top:28px; font-size:0.75rem; color:var(--muted); }
        .footer-note a { color:var(--primary); text-decoration:none; font-weight:600; }
    </style>
</head>
<body>
    <div class="bg-canvas">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="card">
        <div class="deco"></div>
        <div class="portal-badge"><i class="fas fa-boxes-stacked"></i> Inventory Portal</div>
        <h1 class="brand">Le Maison</h1>
        <p class="subtitle">Sign in to access the Inventory workspace</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <div class="alert-error"><i class="fas fa-exclamation-circle"></i> {{ message }}</div>
            {% endfor %}
        {% endwith %}

        <form method="POST" action="{{ url_for('inventory_portal.inventory_login') }}">
            <div class="field-group">
                <label class="field-label" for="email">Email Address</label>
                <div class="field-wrap">
                    <i class="fas fa-envelope field-icon"></i>
                    <input type="email" id="email" name="email" placeholder="staff@lemaison.com" required>
                </div>
            </div>
            <div class="field-group">
                <label class="field-label" for="password">Password</label>
                <div class="field-wrap">
                    <i class="fas fa-lock field-icon"></i>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    <button type="button" class="toggle-pw" onclick="togglePw()"><i class="fas fa-eye" id="pw-eye"></i></button>
                </div>
            </div>
            <button type="submit" class="btn-login" id="login-btn">
                <i class="fas fa-clipboard-list"></i> Access Inventory
            </button>
        </form>
        <div class="footer-note">Not inventory staff? &nbsp;<a href="/">Back to Home</a></div>
    </div>
    <script>
        function togglePw(){const p=document.getElementById('password'),e=document.getElementById('pw-eye');p.type=p.type==='password'?'text':'password';e.className=p.type==='text'?'fas fa-eye-slash':'fas fa-eye';}
        document.querySelector('form').addEventListener('submit',function(){const b=document.getElementById('login-btn');b.innerHTML='<i class="fas fa-spinner fa-spin"></i> Signing in…';b.disabled=true;});
    </script>
</body>
</html>
