{% extends "layouts/base.html" %}

{% block title %}Verify OTP{% endblock %}

{% block content %}
<div class="form-wrapper">
    <h2 class="title">Verify Your Email</h2>
    <p class="subtitle">An OTP was sent to {{ user.email }}.</p>

    <form method="POST" action="{{ url_for('main.verify_otp', user_id=user.id) }}">
        <div class="form-group">
            <label for="otp">Enter 6-digit OTP</label>
            <input type="text" id="otp" name="otp" minlength="6" maxlength="6" required placeholder="123456"
                pattern="\d{6}">
            <small style="color: var(--text-muted); font-size: 0.8rem;">Check your email inbox for the OTP code.</small>
        </div>

        <button type="submit" class="btn">Verify via OTP</button>
    </form>

    <!-- Resend OTP Section -->
    <div style="margin-top: 1.5rem; text-align: center; padding-top: 1rem; border-top: 1px solid rgba(139, 99, 75,0.1);">
        <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.75rem;">Didn't receive the code?</p>

        <form method="POST" action="{{ url_for('main.resend_otp', user_id=user.id) }}" id="resendForm">
            <button type="submit" id="resendBtn" class="btn"
                style="background: transparent; color: var(--primary-color); border: 1.5px solid var(--primary-color); font-size: 0.85rem; padding: 0.5rem 1.5rem; border-radius: 50px; cursor: pointer; font-weight: 600; transition: all 0.3s;"
                {% if cooldown_remaining> 0 %}disabled{% endif %}>
                <i class="fas fa-redo me-1"></i>
                <span id="resendText">
                    {% if cooldown_remaining > 0 %}
                    Resend in <span id="countdown">{{ cooldown_remaining }}</span>s
                    {% else %}
                    Resend Code
                    {% endif %}
                </span>
            </button>
        </form>
    </div>
</div>

<input type="hidden" id="cooldownSeconds" value="{{ cooldown_remaining }}">

{% raw %}
<script>
    (function () {
        var remaining = parseInt(document.getElementById('cooldownSeconds').value) || 0;
        var btn = document.getElementById('resendBtn');
        var textSpan = document.getElementById('resendText');

        if (remaining > 0) {
            btn.disabled = true;
            btn.style.opacity = '0.5';
            btn.style.cursor = 'not-allowed';

            var timer = setInterval(function () {
                remaining--;
                if (remaining <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.style.opacity = '1';
                    btn.style.cursor = 'pointer';
                    textSpan.innerHTML = 'Resend Code';
                } else {
                    var mins = Math.floor(remaining / 60);
                    var secs = remaining % 60;
                    var timeStr = mins > 0 ? mins + 'm ' + ('0' + secs).slice(-2) + 's' : secs + 's';
                    textSpan.innerHTML = 'Resend in ' + timeStr;
                }
            }, 1000);
        }
    })();
</script>
{% endraw %}
{% endblock %}
