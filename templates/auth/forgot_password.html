{% extends "layouts/base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<style>
    .forgot-password-container {
        min-height: 85vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: rgba(255, 255, 255, 0.02);
    }
    
    .stepper {
        display: flex;
        justify-content: space-between;
        position: relative;
        margin-bottom: 3rem;
        max-width: 400px;
        margin-left: auto;
        margin-right: auto;
    }
    
    .stepper::before {
        content: "";
        position: absolute;
        top: 20px;
        left: 0;
        right: 0;
        height: 2px;
        background: #eee;
        z-index: 1;
    }
    
    .step {
        position: relative;
        z-index: 2;
        text-align: center;
        flex: 1;
    }
    
    .step-icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #fff;
        border: 2px solid #eee;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 10px;
        font-weight: bold;
        color: #999;
        transition: all 0.3s ease;
    }
    
    .step.active .step-icon {
        background: #8B634B;
        border-color: #8B634B;
        color: #fff;
        box-shadow: 0 4px 10px rgba(139, 99, 75, 0.3);
    }
    
    .step-label {
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #999;
    }
    
    .step.active .step-label {
        color: #8B634B;
    }
    
    .btn-premium {
        background: linear-gradient(135deg, #5D4037 0%, #795548 100%) !important;
        border: none !important;
        transition: all 0.3s ease !important;
        box-shadow: 0 4px 14px rgba(93, 64, 55, 0.25) !important;
    }
    
    .btn-premium:hover {
        transform: translateY(-2px) !important;
        background: linear-gradient(135deg, #3E2723 0%, #5D4037 100%) !important;
        box-shadow: 0 8px 20px rgba(93, 64, 55, 0.3) !important;
    }
    
    .form-control:focus {
        border-color: #8B634B !important;
        box-shadow: 0 0 0 4px rgba(139, 99, 75, 0.1) !important;
    }
</style>

<div class="forgot-password-container">
    <div class="row w-100 justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0" style="border-radius: 24px; padding: 1rem;">
                <div class="card-body p-5">
                    <!-- Stepper UI -->
                    <div class="stepper">
                        <div class="step active">
                            <div class="step-icon">1</div>
                            <div class="step-label">Email</div>
                        </div>
                        <div class="step">
                            <div class="step-icon">2</div>
                            <div class="step-label">OTP</div>
                        </div>
                        <div class="step">
                            <div class="step-icon">3</div>
                            <div class="step-label">New Pass</div>
                        </div>
                    </div>

                    <div class="text-center mb-5">
                        <div style="background: rgba(139, 99, 75, 0.08); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                            <i class="fas fa-lock fa-2x" style="color: #8B634B;"></i>
                        </div>
                        <h2 class="fw-bold" style="font-family: 'Playfair Display', serif; color: #5D4037; font-size: 2rem;">Forgot Password</h2>
                        <p class="text-muted mx-auto" style="max-width: 300px; font-size: 0.95rem;">Enter your email and we'll send you an OTP code to reset your password.</p>
                    </div>

                    <form method="POST" action="{{ url_for('main.forgot_password') }}">
                        <div class="form-group mb-4">
                            <label for="email" class="fw-bold text-dark small mb-2 ms-1">Email Address</label>
                            <input type="email" id="email" name="email" class="form-control p-3 rounded-3" 
                                style="border: 1px solid #dee2e6; font-size: 1rem;" 
                                required placeholder="Enter your email address">
                        </div>

                        <button type="submit" class="btn w-100 rounded-pill py-3 fw-bold text-white btn-premium">
                            Send OTP Code
                        </button>
                    </form>

                    <div class="text-center mt-5">
                        <p class="text-muted small mb-0">
                            Remember your password? 
                            <a href="{{ url_for('main.login') }}" class="fw-bold text-decoration-none ms-1" style="color: #8B634B;">Back to Login</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
