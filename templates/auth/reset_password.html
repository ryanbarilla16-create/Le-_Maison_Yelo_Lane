{% extends "layouts/base.html" %}

{% block title %}Set New Password{% endblock %}

{% block content %}
<div class="row justify-content-center p-3">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-0" style="border-radius: 16px; background-color: rgba(255, 255, 255, 0.95);">
            <div class="card-body p-5">
                <div class="stepper mb-4">
                    <div class="step completed">
                        <div class="step-icon"><i class="fas fa-check"></i></div>
                        <span class="step-label">Email</span>
                    </div>
                    <div class="step completed">
                        <div class="step-icon"><i class="fas fa-check"></i></div>
                        <span class="step-label">OTP</span>
                    </div>
                    <div class="step active">
                        <div class="step-icon">3</div>
                        <span class="step-label">New Pass</span>
                    </div>
                </div>

                <div class="text-center mb-4">
                    <i class="fas fa-key fa-3x" style="color: var(--primary-color);"></i>
                    <h2 class="fw-bold mt-3" style="font-family: 'Georgia', serif; color: var(--text-main);">Set New Password</h2>
                    <p class="text-muted" style="font-size: 0.95rem;">Please enter and confirm your new password below.</p>
                </div>

                <form method="POST" action="{{ url_for('main.reset_password') }}">
                    <div class="form-group mb-4 text-start">
                        <label for="new_password" class="fw-bold text-muted small mb-2">New Password <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-white" style="border-right: none; border-color: rgba(139, 99, 75, 0.2);">
                                <i class="fas fa-lock text-muted"></i>
                            </span>
                            <input type="password" id="new_password" name="new_password" class="form-control form-control-lg bg-white" 
                                style="border-left: none; border-right: none; border-color: rgba(139, 99, 75, 0.2);" required placeholder="Min 6 characters">
                            <span class="input-group-text bg-white" style="border-left: none; border-color: rgba(139, 99, 75, 0.2); cursor: pointer;" onclick="togglePassword('new_password', 'toggleNewPasswordIcon')">
                                <i class="fas fa-eye text-muted" id="toggleNewPasswordIcon"></i>
                            </span>
                        </div>
                    </div>

                    <div class="form-group mb-5 text-start">
                        <label for="confirm_password" class="fw-bold text-muted small mb-2">Confirm New Password <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-white" style="border-right: none; border-color: rgba(139, 99, 75, 0.2);">
                                <i class="fas fa-lock text-muted"></i>
                            </span>
                            <input type="password" id="confirm_password" name="confirm_password" class="form-control form-control-lg bg-white" 
                                style="border-left: none; border-right: none; border-color: rgba(139, 99, 75, 0.2);" required placeholder="Retype password">
                            <span class="input-group-text bg-white" style="border-left: none; border-color: rgba(139, 99, 75, 0.2); cursor: pointer;" onclick="togglePassword('confirm_password', 'toggleConfirmPasswordIcon')">
                                <i class="fas fa-eye text-muted" id="toggleConfirmPasswordIcon"></i>
                            </span>
                        </div>
                    </div>

                    <button type="submit" class="btn w-100 rounded-pill py-3 fw-bold text-white shadow-sm"
                        style="background-color: var(--primary-color); font-size: 1.1rem; transition: transform 0.2s;">
                        Set New Password
                    </button>
                </form>

                <p class="text-center mt-4 mb-0 text-muted small">
                    <a href="{{ url_for('main.login') }}" class="fw-bold text-decoration-none"
                        style="color: var(--primary-hover);">Cancel and Return to Login</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
    function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
</script>
{% endblock %}
