<!doctype html>
<html class="h-100" lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Kitchen Login | Le Maison</title>
    <meta content='width=device-width, initial-scale=1.0, shrink-to-fit=no' name='viewport' />
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon"/>

    <!-- Fonts and icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        .divider:after,
        .divider:before {
            content: "";
            flex: 1;
            height: 1px;
            background: #eee;
        }
        .h-custom {
            height: calc(100vh - 30px);
        }
        @media (max-width: 450px) {
            .h-custom {
                height: 100vh;
            }
        }

        body {
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1556910103-1c02745aae4d?auto=format&fit=crop&q=80&w=2000');
            background-position: center;
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
        }

        .faculty_input {
            margin: 0 auto;
            height: 3.3rem !important;
            border-radius: 1rem;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            padding-left: 2.5rem !important;
        }

        .faculty_btn_login {
            margin: 0 auto;
            height: 3.3rem !important;
            border-radius: 1rem;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            letter-spacing: 0.2rem;
            font-weight: 500;
            width: 94%;
            background-color: #3E2723 !important; /* Darker Kitchen Brown */
            color: white !important;
            transition: all 0.3s ease;
            border: none;
        }
        .faculty_btn_login:hover {
            background-color: #21100B !important;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(62, 39, 35, 0.4);
        }

        .lulms-card {
            display: flex !important;
            width: 100% !important;
            justify-content: center !important;
            align-items: center !important;
        }

        .lulms {
            width: 80% !important;
            font-family: 'Poppins', sans-serif !important;
            font-size: 0.9rem !important;
            word-wrap: break-word !important;
            font-weight: 400 !important;
            color: #666;
        }

        .lu-welcome {
            color: rgb(69, 69, 69) !important;
            font-family: 'Poppins', sans-serif !important;
            font-size: 1.8rem !important;
            font-weight: 800 !important;
        }

        .lu-user_type {
            color: #3E2723;
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 0.2rem;
            font-weight: 600;
        }

        .input-icon {
            position: relative;
        }
        .input-icon-addon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #3E2723;
            z-index: 10;
        }

        .flash-message {
            background: #ffebee;
            color: #c62828;
            border-radius: 12px;
            padding: 0.8rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
            font-size: 0.85rem;
            border: 1px solid #ffcdd2;
        }

        @media screen and (max-width: 400px) {
            #login_form {
               padding: 0 1rem 0 1rem !important;
            }
            .lulms { width: 100% !important; }
            .lu-user_type { font-size: 1.2rem; }
        }
    </style>
</head>

<body>
    <section class="h-100">
        <div class="container-fluid h-custom">
            <div class="row d-flex justify-content-center align-items-center h-100">
                <div class="col-md-8 col-lg-5 col-xl-4 offset-xl-1 text-center order-lg-2 mb-5 mb-lg-0">
                    <i class="fas fa-fire-burner text-white mb-3" style="font-size: 5rem; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));"></i>
                    <h1 class="display-3 text-white mb-1" style="font-weight: 800;"><b>Le Maison</b></h1>
                    <h2 class="text-white mb-0" style="font-weight: 300; letter-spacing: 5px;">KITCHEN HUD</h2>
                </div>

                <div class="col-md-8 col-lg-5 col-xl-4 order-lg-1">
                    <div class="card card-body shadow py-5 my-5" style="border-radius: 1.5rem; background: rgba(255, 255, 255, 0.95);">
                        <div class="lulms-card">
                            <div style="width:80%">
                                <h3 class="lu-welcome mb-1">Welcome to <span style="color:#3E2723;">Le Maison</span></h3>
                                <h6 class="lulms mb-5">
                                    Meal Preparation Dashboard
                                </h6>
                            </div>
                        </div>
                        <hr class="my-1" style="width:80%; margin: 0 auto; opacity: 0.1;">
                        <h2 class="text-center lu-user_type my-3">KITCHEN OPS</h2>
                        <hr class="my-1" style="width:80%; margin: 0 auto; opacity: 0.1;">

                        {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                        <div class="mt-4 px-2">
                            {% for category, message in messages %}
                            <div class="flash-message text-center">
                                <i class="fas fa-exclamation-circle me-2"></i> {{ message }}
                            </div>
                            {% endfor %}
                        </div>
                        {% endif %}
                        {% endwith %}

                        <form method="POST" action="{{ url_for('kitchen_portal.kitchen_login') }}" id="login_form" style="padding: 1rem 2rem 2rem 2rem;">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token else '' }}">
                            <div class="form-group mt-4 mb-3">
                                <div class="input-icon">
                                    <span class="input-icon-addon"><i class="fa fa-envelope"></i></span>
                                    <input placeholder="Email Address" class="faculty_input form-control" type="email" name="email" required>
                                </div>
                            </div>

                            <div class="form-group mb-3 position-relative">
                                <div class="input-icon">
                                    <span class="input-icon-addon"><i class="fa fa-lock"></i></span>
                                    <input placeholder="Password" class="faculty_input form-control" type="password" id="password" name="password" required>
                                    <span id="togglePassword" style="position:absolute; right:20px; top:50%; transform:translateY(-50%); cursor:pointer; color: #3E2723; z-index: 10;">
                                        <i class="fa fa-eye" id="passwordToggleIcon"></i>
                                    </span>
                                </div>
                                <div class="text-end mt-2">
                                    <a href="{{ url_for('kitchen_portal.kitchen_forgot_password') }}" style="color: #3E2723; font-size: 0.8rem; text-decoration: none; font-weight: 500;">Forgot Password?</a>
                                </div>
                            </div>

                            <div class="text-center mt-4">
                                <button type="submit" class="faculty_btn_login btn" id="login_btn">
                                    <i class="fa fa-sign-in-alt me-2"></i> LOGIN
                                </button>
                            </div>

                            <div class="text-center mt-4 pt-2">
                                <a href="{{ url_for('main.index') }}" style="color: #999; text-decoration: none; font-size: 0.85rem;">
                                    <i class="fas fa-arrow-left me-1"></i> Return to Gateway
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).on('click', '#login_btn', function (e) {
            const form = $('#login_form')[0];
            if (form.checkValidity()) {
                $(this).prop('disabled', true).html('<i class="fas fa-spinner fa-spin me-2"></i> LOADING');
                form.submit();
            }
        });

        $('#togglePassword').click(function() {
            var passwordInput = $('#password');
            var passwordToggleIcon = $('#passwordToggleIcon');
            if (passwordInput.attr('type') === 'password') {
                passwordInput.attr('type', 'text');
                passwordToggleIcon.removeClass('fa-eye').addClass('fa-eye-slash');
            } else {
                passwordInput.attr('type', 'password');
                passwordToggleIcon.removeClass('fa-eye-slash').addClass('fa-eye');
            }
        });
    </script>
</body>
</html>
