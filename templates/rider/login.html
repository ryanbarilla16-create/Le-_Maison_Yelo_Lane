<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Login — Le Maison</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #A85A2A; /* Burnt Brown/Orange for Rider */
            --primary-light: #BF360C;
            --primary-dark: #5D4037;
            --accent: #FFAB91;
            --bg: #FFF8F1;
            --glass: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.9);
            --text: #3E2723;
            --muted: #8D6E63;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        .bg-canvas {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 70% 60% at 15% 20%, rgba(168, 90, 42, 0.1) 0%, transparent 60%),
                radial-gradient(ellipse 60% 70% at 85% 85%, rgba(93, 64, 55, 0.08) 0%, transparent 55%),
                linear-gradient(150deg, #FFF8F1 0%, #F5E6D3 50%, #E8D5C8 100%);
        }
        .blob { position: absolute; border-radius: 50%; filter: blur(70px); animation: drift 15s ease-in-out infinite alternate; }
        .blob-1 { width: 450px; height: 450px; background: rgba(93, 64, 55, 0.08); top: -100px; left: -100px; }
        .blob-2 { width: 350px; height: 350px; background: rgba(168, 90, 42, 0.06); bottom: -50px; right: -50px; }
        @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,25px) scale(1.1); } }

        .card {
            position: relative; z-index: 1;
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 32px;
            padding: 50px; width: 100%; max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(93, 64, 55, 0.12);
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .portal-badge { display:inline-flex; align-items:center; gap:8px; background:rgba(93, 64, 55, 0.08); border:1px solid rgba(93, 64, 55, 0.15); border-radius:50px; padding:6px 16px; font-size:0.75rem; font-weight:700; color:var(--primary-dark); letter-spacing:1px; text-transform:uppercase; margin-bottom:24px; }
        .brand { font-family:'Playfair Display',serif; font-size:1.8rem; color:var(--text); margin-bottom:6px; }
        .subtitle { color:var(--muted); font-size:0.9rem; margin-bottom:36px; }

        .form-group { margin-bottom:20px; }
        .label { display:block; font-size:0.8rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
        .input-wrap { position:relative; }
        .input-icon { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:0.9rem; }
        input { width:100%; padding:14px 16px 14px 44px; background:rgba(255, 255, 255, 0.5); border:1.5px solid rgba(168, 90, 42, 0.1); border-radius:16px; font-family:'Outfit',sans-serif; font-size:1rem; color:var(--text); transition:0.3s; }
        input:focus { background:#fff; border-color:var(--primary-dark); outline:none; box-shadow:0 0 0 4px rgba(93, 64, 55, 0.05); }

        .btn-login { width:100%; padding:16px; background:var(--primary-dark); color:#fff; border:none; border-radius:16px; font-size:1rem; font-weight:700; cursor:pointer; transition:0.3s; box-shadow:0 10px 20px rgba(93, 64, 55, 0.2); margin-top:10px; display:flex; align-items:center; justify-content:center; gap:10px; }
        .btn-login:hover { background:var(--primary-light); transform:translateY(-2px); box-shadow:0 15px 30px rgba(93, 64, 55, 0.3); }
        .btn-login:disabled { opacity:0.7; cursor:not-allowed; }

        .flash-msg { background:rgba(198,40,40,0.05); color:#c62828; padding:12px; border-radius:12px; font-size:0.85rem; margin-bottom:20px; border:1px solid rgba(198,40,40,0.1); display:flex; align-items:center; gap:10px; }
        .footer-links { text-align:center; margin-top:30px; font-size:0.8rem; color:var(--muted); }
        .footer-links a { color:var(--primary-dark); text-decoration:none; font-weight:700; transition:0.2s; }
        .footer-links a:hover { color:var(--primary-light); }
    </style>
</head>
<body>
    <div class="bg-canvas">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    <div class="card">
        <div class="portal-badge"><i class="fas fa-motorcycle"></i> Rider Portal</div>
        <h1 class="brand">Le Maison</h1>
        <p class="subtitle">Secure login for dispatch and delivery tracking</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <div class="flash-msg"><i class="fas fa-exclamation-circle"></i> {{ message }}</div>
            {% endfor %}
        {% endwith %}

        <form method="POST" action="{{ url_for('rider_portal.rider_login') }}" id="loginForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token else '' }}">
            <div class="form-group">
                <label class="label">Email Address</label>
                <div class="input-wrap">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" name="email" placeholder="rider@lemaison.com" required>
                </div>
            </div>
            <div class="form-group pb-2">
                <label class="label">Password</label>
                <div class="input-wrap">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" name="password" id="password" placeholder="••••••••" required>
                    <button type="button" onclick="togglePw()" style="position:absolute; right:16px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); cursor:pointer;">
                        <i class="fas fa-eye" id="pwIcon"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <div class="footer-links">
            <a href="/" style="color:var(--muted); font-weight:400;"><i class="fas fa-arrow-left me-1"></i> Back to Gateway</a>
        </div>
    </div>

    <script>
        function togglePw() {
            const p = document.getElementById('password'), i = document.getElementById('pwIcon');
            p.type = p.type === 'password' ? 'text' : 'password';
            i.className = p.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
        }
        document.getElementById('loginForm').addEventListener('submit', function() {
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Initializing...';
            btn.disabled = true;
        });
    </script>
</body>
</html>
