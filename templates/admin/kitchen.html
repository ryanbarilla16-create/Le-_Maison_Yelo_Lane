{% extends "admin/base.html" %}

{% block title %}Kitchen Display | Le Maison Kitchen{% endblock %}

{% block content %}
<!-- HEADER SYNCED WITH CHATS ALIGNMENT -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 style="font-family: 'Georgia', serif; color: #5D4037; font-size: 2rem; font-weight: bold; margin: 0;">
        Kitchen Display System</h1>
</div>

<!-- STANDARD ROW/COL ALIGNMENT (JUST LIKE CHATS PAGE) -->
<div class="row">
    <div class="col-md-12">
        <div id="kitchen-content-wrapper" style="min-height: 75vh;">
            {% include 'admin/kitchen_partial.html' %}
        </div>
    </div>
</div>

<style>
    /* ── KITCHEN PREMIUM STYLES ── */
    .kitchen-title { font-family: 'Georgia', serif; color: #1A1A1A; font-size: 1.8rem; font-weight: 700; }
    .kitchen-toggle-group { display: flex; align-items: center; gap: 8px; padding: 8px 15px; background: #ffffff; border: 1px solid #eee; border-radius: 12px; }
    .toggle-label { font-size: 0.72rem; font-weight: 700; color: #8B634B; text-transform: uppercase; letter-spacing: 0.8px; }

    /* ── STAT CARDS ── */
    .kds-stat-card { display: flex; align-items: center; gap: 15px; padding: 20px; background: #ffffff; border: 1px solid rgba(139, 99, 75, 0.08); border-radius: 16px; transition: all 0.2s ease; }
    .kds-stat-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.05); }
    .kds-stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
    .kds-stat-value { font-size: 1.6rem; font-weight: 800; color: #2D1A12; line-height: 1; }
    .kds-stat-label { font-size: 0.7rem; font-weight: 600; color: #AC8A78; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

    /* ── FILTER TABS ── */
    .kds-filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; }
    .kds-filter-tab { display: flex; align-items: center; gap: 10px; padding: 12px 20px; background: #ffffff; border: 1px solid #eee; border-radius: 12px; color: #5D4037; font-size: 0.85rem; font-weight: 700; text-decoration: none; transition: all 0.2s ease; }
    .kds-filter-tab:hover { background: #FDFBFA; border-color: #8B634B; color: #5D4037; }
    .kds-filter-tab.active { background: #5D4037; color: #ffffff; border-color: #5D4037; }
    .kds-filter-tab.active .kds-dot { background: #fff !important; }
    .kds-filter-tab.active .kds-count { background: rgba(255,255,255,0.2); color: #fff; }

    .kds-dot { width: 8px; height: 8px; border-radius: 50%; }
    .kds-count { background: #F2EEEC; color: #8B634B; font-size: 0.72rem; font-weight: 800; padding: 2px 10px; border-radius: 20px; }

    /* ── PREP PANEL ── */
    .kds-prep-body { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
    .kds-station { background: #ffffff; border-radius: 20px; padding: 20px; border: 1px solid rgba(139, 99, 75, 0.1); box-shadow: 0 4px 20px rgba(139, 99, 75, 0.03); }
    .kds-station-label { font-size: 0.8rem; font-weight: 800; color: #8B634B; display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; margin-bottom: 12px; border-bottom: 1px solid #FAF7F5; }
    .kds-prep-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
    .kds-prep-item:hover { background: #FDFBFA; }
    .kds-prep-item.is-done { opacity: 0.4; }
    .kds-prep-check { width: 20px; height: 20px; border: 2px solid #DCD1CB; border-radius: 6px; margin-right: 12px; display: flex; align-items: center; justify-content: center; }
    .kds-prep-item.is-done .kds-prep-check { background: #27AE60; border-color: #27AE60; color: #fff; }
    .kds-prep-name { font-weight: 600; color: #444; flex: 1; font-size: 0.9rem; }
    .kds-prep-qty { font-weight: 800; color: #8B634B; background: #F9F4F2; padding: 4px 10px; border-radius: 8px; font-size: 0.85rem; }

    /* ── ORDER CARDS ── */
    .kds-order-card { background: #ffffff; border-radius: 18px; border: 1px solid #f2f2f2; overflow: hidden; transition: all 0.3s; height: 100%; display: flex; flex-direction: column; }
    .kds-order-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.08); }
    .kds-order-card[data-status="PENDING"] { border-top: 5px solid #F39C12; }
    .kds-order-card[data-status="PREPARING"] { border-top: 5px solid #3498DB; }
    .kds-order-card[data-status="COMPLETED"] { border-top: 5px solid #27AE60; }

    .kds-order-header { padding: 18px 20px; border-bottom: 1px solid #fafafa; display: flex; justify-content: space-between; align-items: center; }
    .kds-order-id { font-family: 'Georgia', serif; font-weight: 800; color: #2D1A12; }
    .kds-customer-name { font-weight: 800; color: #2D1A12; font-size: 0.95rem; }
    .kds-dine-badge { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; }
    .kds-dine-badge.dine-in { background: #E8F5E9; color: #2E7D32; }
    .kds-items-list { margin-top: 15px; }
    .kds-item-row { display: flex; align-items: center; gap: 10px; padding: 5px 0; }
    .kds-item-qty { font-weight: 800; color: #8B634B; }
    .kds-timer { margin-top: 15px; font-size: 0.8rem; color: #999; font-weight: 700; display: flex; align-items: center; gap: 6px; }

    .kds-btns-group { display: flex; gap: 8px; width: 100%; }
    .kds-order-footer { padding: 20px; border-top: 1px solid #f9f9f9; }
    .btn-kd { padding: 10px 15px; border-radius: 12px; border: none; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.2s; }
    .btn-kd-start { background: #2D1A12; color: #fff; width: 100%; }
    .btn-kd-complete { background: #27AE60; color: #fff; width: 100%; }
    .btn-kd-cancel { background: #F2F2F2; color: #999; }
</style>
{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
<script>
    async function loadKitchenPartial(url, showLoading = true) {
        const wrapper = document.getElementById('kitchen-content-wrapper');
        const refreshToggle = document.getElementById('autoRefreshToggle');
        if (!showLoading && refreshToggle && !refreshToggle.checked) return;
        try {
            // Added cache buster (timestamp) to prevent showing old content
            const timestamp = new Date().getTime();
            const response = await fetch(url + (url.includes('?') ? '&' : '?') + 'partial=1&cb=' + timestamp);
            const html = await response.text();
            wrapper.innerHTML = html;
            initializeDynamicElements();
        } catch (e) { console.error('Failed to update kitchen:', e); }
    }

    async function handleKitchenUpdate(event, form, orderId, confirmCancel = false) {
        event.preventDefault();
        if (confirmCancel && !confirm('Are you sure?')) return;
        try {
            await fetch(form.action || `/admin/orders/update/${orderId}`, { method: 'POST', body: new FormData(form) });
            loadKitchenPartial(window.location.href, false);
        } catch (e) { console.error('Update failed:', e); }
    }

    function initializeDynamicElements() {
        document.querySelectorAll('.order-time').forEach(el => {
            if (el.dataset.utc) {
                const date = new Date(el.dataset.utc);
                el.textContent = date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
            }
        });
        updateTimers();
    }

    function updateTimers() {
        document.querySelectorAll('.elapsed-timer').forEach(el => {
            const created = el.dataset.created; if (!created) return;
            const diff = Math.floor((new Date() - new Date(created)) / 1000);
            const m = Math.floor(diff/60); const s = diff%60;
            el.textContent = (m>0 ? m+'m ' : '') + s+'s ago';
            if (m>=15) el.className = 'elapsed-timer text-danger';
            else if (m>=8) el.className = 'elapsed-timer text-warning';
        });
    }

    setInterval(updateTimers, 1000);
    const socket = io();
    socket.on('new_order', () => loadKitchenPartial(window.location.href, false));
    socket.on('order_status_update', () => loadKitchenPartial(window.location.href, false));
    initializeDynamicElements();
</script>
{% endblock %}
