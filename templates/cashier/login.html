<!doctype html>
<html class="h-100" lang="en">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Cashier Login | Le Maison</title>
    <meta content='width=device-width, initial-scale=1.0, shrink-to-fit=no' name='viewport' />

    <!-- Fonts and icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            /* Cashier Theme: Green (#2e7d32, 46, 125, 50) */
            background: linear-gradient(rgba(46, 125, 50, 0.20), rgba(0, 0, 0, 0.75)), url('https://i.postimg.cc/PqLbFYhr/9.webp');
            background-position: center;
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            margin: 0;
        }

        .h-custom {
            height: calc(100vh - 30px);
        }

        @media (max-width: 450px) {
            .h-custom { height: 100vh; }
        }

        .admin_input {
            margin: 0 auto;
            height: 3.3rem !important;
            border-radius: 1rem;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            padding-left: 2.5rem; /* Space for the absolute icon */
            box-shadow: none !important;
            border: 1px solid #ddd;
        }

        .admin_input:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 0 0.2rem rgba(46, 125, 50, 0.25) !important;
        }

        .input-icon {
            position: relative;
        }

        .input-icon-addon {
            position: absolute;
            top: 50%;
            left: 1rem;
            transform: translateY(-50%);
            color: #888;
            z-index: 4;
        }

        .admin_btn_login {
            margin: 0 auto;
            height: 3.3rem !important;
            border-radius: 1rem;
            font-family: 'Poppins', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 0.15rem;
            font-weight: 600;
            width: 100%;
            background-color: #2e7d32 !important;
            color: white !important;
            border: none;
            transition: all 0.3s ease;
        }

        .admin_btn_login:hover {
            background-color: #1b5e20 !important;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 125, 50, 0.4);
        }

        .lulms-card {
            display: flex !important;
            width: 100% !important;
            justify-content: center !important;
            align-items: center !important;
        }

        .lulms {
            width: 100% !important;
            font-family: 'Poppins', sans-serif !important;
            font-size: 1rem !important;
            color: #666;
            word-wrap: break-word !important;
            font-weight: 400 !important;
        }

        .lu-welcome {
            color: rgb(69, 69, 69) !important;
            font-family: 'Poppins', sans-serif !important;
            font-size: 2rem !important;
            font-weight: 800 !important;
        }

        .lu-user_type {
            color: #2e7d32;
            font-family: 'Poppins', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 0.2rem;
            font-weight: 600;
        }

        .flash-msg {
            background: #ffebee;
            color: #c62828;
            border-radius: 12px;
            padding: 0.8rem;
            margin-top: 1rem;
            font-weight: 500;
            font-size: 0.9rem;
            text-align: center;
            border: 1px solid #ffcdd2;
        }

        @media screen and (max-width: 400px) {
            #login_form {
               padding: 0 1rem 0 1rem !important;
            }
            .lu-user_type {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body class="h-100">

<section class="h-100">
    <div class="container-fluid h-custom">
        <div class="row d-flex justify-content-center align-items-center h-100">
            
            <!-- Branding Section -->
            <div class="col-md-8 col-lg-5 col-xl-4 offset-xl-1 text-center order-1 order-lg-2 mb-5 mb-lg-0">
                <i class="fas fa-cash-register text-white mb-3" style="font-size: 5rem; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));"></i>
                <h1 class="display-3 text-white mb-1" style="font-weight: 800; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));"><b>Le Maison</b></h1>
                <h2 class="text-white mb-0" style="font-weight: 300; letter-spacing: 0.3rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));">PREMIUM DINING</h2>
            </div>

            <!-- Login Form Card Section -->
            <div class="col-md-8 col-lg-5 col-xl-4 order-2 order-lg-1">
                <div class="card card-body shadow py-5 my-2 my-lg-5" style="border-radius: 1.5rem; background: rgba(255, 255, 255, 0.98);">
                    <div class="lulms-card text-center">
                        <div style="width: 100%;">
                            <h3 class="lu-welcome mb-1">Welcome to <span style="color:#2e7d32;">Le Maison</span></h3>
                            <h6 class="lulms mb-4">
                                Point of Sale & Customer Terminal
                            </h6>
                        </div>
                    </div>

                    <hr class="my-1" style="width:80%; margin: 0 auto; border-color: #eee;">
                    <h2 class="text-center lu-user_type my-3">CASHIER TERMINAL</h2>
                    <hr class="my-1" style="width:80%; margin: 0 auto; border-color: #eee;">

                    <!-- Flash messages -->
                    {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        <div class="px-4">
                        {% for category, message in messages %}
                            <div class="flash-msg">
                                <i class="fas fa-exclamation-triangle me-2"></i> {{ message }}
                            </div>
                        {% endfor %}
                        </div>
                    {% endif %}
                    {% endwith %}

                    <form method="POST" action="{{ url_for('cashier_portal.cashier_login') }}" id="login_form" style="padding: 1rem 2rem 1rem 2rem;">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token else '' }}">
                        
                        <div class="form-group mt-3 mb-3">
                            <div class="input-icon">
                                <span class="input-icon-addon"><i class="fa fa-envelope"></i></span>
                                <input placeholder="Account Email" class="admin_input form-control" type="email" id="email" name="email" required>
                            </div>
                        </div>

                        <div class="form-group mb-4">
                            <div class="input-icon">
                                <span class="input-icon-addon"><i class="fa fa-lock"></i></span>
                                <input class="admin_input form-control" type="password" id="password" name="password" placeholder="Passcode" required>
                            </div>
                        </div>
                        
                        <div class="text-center mt-2">
                            <button type="submit" class="admin_btn_login btn" id="login_btn">LOGIN</button>
                        </div>
                        
                        <div class="text-center mt-4 pt-2">
                            <a href="{{ url_for('main.index') }}" class="text-muted text-decoration-none" style="font-size: 0.9rem; transition: color 0.2s;">
                                <i class="fas fa-arrow-left me-1"></i> Return to Gateway
                            </a>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const form = document.getElementById('login_form');
        const btn = document.getElementById('login_btn');
        form.addEventListener('submit', function() {
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> AUTHENTICATING...';
            btn.style.opacity = '0.8';
        });
    });
</script>

</body>
</html>
