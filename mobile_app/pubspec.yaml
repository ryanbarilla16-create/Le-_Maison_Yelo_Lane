name: mobile_app
description: "Le Maison Yelo Lane - Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  shared_preferences: ^2.5.4
  intl: ^0.20.2
  google_sign_in: ^6.2.1
  url_launcher: ^6.3.2
  geolocator: ^13.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  image_picker: ^1.1.2
  flutter_dotenv: ^5.1.0
  webview_flutter: ^4.13.1
  socket_io_client: ^3.1.2
  flutter_spinkit: ^5.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "brand/logo.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - .env
    - brand/logo.jpg

